backend:
  name: github
  repo: repo: smills1840/pcc-website
  branch: main
  base_url: https://sveltia-cms-auth.smills1840.workers.dev

media_folder: "assets"
public_folder: "assets"

site_url: https://pcc-website.pages.dev
display_url: https://pcc-website.pages.dev

collections:

  # ── PROJECT GALLERY ────────────────────────────────────────────
  - name: "gallery"
    label: "📸 Project Gallery"
    label_singular: "Project"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} — {{location}}"
    fields:
      - label: "Project Title"
        name: "title"
        widget: "string"
        hint: "e.g. 2-Car Garage — Full Flake System"

      - label: "Location"
        name: "location"
        widget: "string"
        hint: "e.g. Blacksburg, VA"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Garage Floor", value: "garage" }
          - { label: "Commercial", value: "commercial" }
          - { label: "Residential", value: "residential" }
          - { label: "Polished Concrete", value: "polished" }
          - { label: "Patio / Pool Deck", value: "patio" }

      - label: "Project Photo"
        name: "image"
        widget: "image"
        hint: "Upload a photo of the finished project"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "2-3 sentences about the project — system used, challenges, result"

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Featured projects appear first in the gallery"

      - label: "Date Completed"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_only: true
        required: false

  # ── BLOG POSTS ─────────────────────────────────────────────────
  - name: "blog"
    label: "✍️ Blog Posts"
    label_singular: "Blog Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} ({{date}})"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_only: true

      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Summary"
        name: "summary"
        widget: "string"
        hint: "One sentence shown in listings and Google search results"

      - label: "Content"
        name: "body"
        widget: "markdown"

      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
        hint: "Uncheck to save as draft"

  # ── PAGE CONTENT ───────────────────────────────────────────────
  - name: "pages"
    label: "📄 Page Content"
    files:

      - label: "Homepage"
        name: "home"
        file: "_data/home.json"
        extension: "json"
        format: "json"
        fields:
          - label: "Hero Badge Text"
            name: "hero_badge"
            widget: "string"
            default: "Defining Material Excellence"
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
            default: "POURED TO PERFECTION."
          - label: "Hero Subtitle"
            name: "hero_subtitle"
            widget: "text"
            default: "Premium industrial-grade surfacing serving Southwest Virginia."
          - label: "Philosophy Heading"
            name: "philosophy_heading"
            widget: "string"
            default: "NOT JUST A FLOOR. A FOUNDATION."
          - label: "Philosophy Body"
            name: "philosophy_body"
            widget: "text"
          - label: "Stat 1 Number"
            name: "stat1_number"
            widget: "string"
            default: "15+"
          - label: "Stat 1 Label"
            name: "stat1_label"
            widget: "string"
            default: "Years Exp"
          - label: "Stat 2 Number"
            name: "stat2_number"
            widget: "string"
            default: "2M+"
          - label: "Stat 2 Label"
            name: "stat2_label"
            widget: "string"
            default: "Sq Ft Poured"
          - label: "Stat 3 Number"
            name: "stat3_number"
            widget: "string"
            default: "100%"
          - label: "Stat 3 Label"
            name: "stat3_label"
            widget: "string"
            default: "Industrial Grade"

      - label: "Garage Makeovers Page"
        name: "garage"
        file: "_data/garage.json"
        extension: "json"
        format: "json"
        fields:
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
            default: "The Ultimate Garage Transformation"
          - label: "Hero Subtitle"
            name: "hero_subtitle"
            widget: "text"
          - label: "Price Per Sq Ft ($)"
            name: "price_per_sqft"
            widget: "number"
            default: 7
            hint: "This updates the instant estimator automatically"
          - label: "Phone Number"
            name: "phone"
            widget: "string"
            default: "(540) 212-4082"

      - label: "Business Info"
        name: "business"
        file: "_data/business.json"
        extension: "json"
        format: "json"
        fields:
          - label: "Business Name"
            name: "name"
            widget: "string"
            default: "Prestige Concrete Coatings"
          - label: "Phone Number"
            name: "phone"
            widget: "string"
            default: "(540) 212-4082"
          - label: "Email"
            name: "email"
            widget: "string"
            default: "info@prestigeconcretecoatings.com"
          - label: "Tagline"
            name: "tagline"
            widget: "string"
          - label: "Service Radius (miles)"
            name: "radius"
            widget: "number"
            default: 75
          - label: "Google Reviews Link"
            name: "google_reviews"
            widget: "string"
            required: false
            hint: "Paste your Google Business review link here when you have one"
          - label: "Facebook Link"
            name: "facebook"
            widget: "string"
            required: false
          - label: "Instagram Link"
            name: "instagram"
            widget: "string"
            required: false

  # ── TESTIMONIALS ───────────────────────────────────────────────
  - name: "testimonials"
    label: "⭐ Testimonials"
    label_singular: "Testimonial"
    folder: "_testimonials"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{name}} — {{location}}"
    fields:
      - label: "Customer Name"
        name: "name"
        widget: "string"
        hint: "e.g. David M. (use first name + last initial for privacy)"
      - label: "Location"
        name: "location"
        widget: "string"
        hint: "e.g. Blacksburg, VA"
      - label: "Review"
        name: "review"
        widget: "text"
        hint: "The customer's actual review text"
      - label: "Star Rating"
        name: "rating"
        widget: "select"
        options: ["5", "4", "3"]
        default: "5"
      - label: "Service Type"
        name: "service"
        widget: "select"
        options:
          - { label: "Garage Floor", value: "garage" }
          - { label: "Commercial", value: "commercial" }
          - { label: "Residential", value: "residential" }
          - { label: "Patio / Pool Deck", value: "patio" }
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: true
        hint: "Featured reviews appear on the Residential page"
