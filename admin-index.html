<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Prestige CMS | Admin</title>
  <link rel="icon" type="image/png" href="../assets/logo.png"/>
  <!-- Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <style>
    /* Loading screen while CMS initialises */
    #cms-loading {
      position: fixed; inset: 0;
      background: #0e0e0e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #FEC300;
      z-index: 9999;
    }
    #cms-loading img { height: 48px; margin-bottom: 24px; filter: brightness(0) invert(1); }
    #cms-loading p { color: #767575; font-size: 14px; margin-top: 12px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(254,195,0,0.2);
      border-top-color: #FEC300;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="cms-loading">
    <img src="../assets/logo.png" alt="Prestige Concrete Coatings" onerror="this.style.display='none'"/>
    <div class="spinner"></div>
    <p>Loading dashboard...</p>
  </div>
  <script>
    // Hide loading screen once CMS mounts
    window.addEventListener('load', () => {
      setTimeout(() => {
        const el = document.getElementById('cms-loading');
        if (el) el.style.display = 'none';
      }, 1500);
    });
  </script>
</body>
</html>
