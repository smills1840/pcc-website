<script>
  // Mobile menu
  document.getElementById('mobile-menu-btn').addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('open');
  });

  // ---- Before/After Slider ----
  const slider  = document.getElementById('ba-slider');
  const after   = document.getElementById('ba-after');
  const divider = document.getElementById('ba-divider');
  const hint    = document.getElementById('drag-hint');
  const labelBefore = document.getElementById('label-before');
  const labelAfter  = document.getElementById('label-after');
  let dragging  = false;

  function setPos(x) {
    const r = slider.getBoundingClientRect();
    let p = Math.min(Math.max((x - r.left) / r.width, 0.02), 0.98);
    after.style.width  = (p * 100) + '%';
    divider.style.left = (p * 100) + '%';
    slider.style.setProperty('--slider-full-width', r.width + 'px');
    after.querySelectorAll('img').forEach(el => el.style.minWidth = r.width + 'px');

    // Show AFTER label only when slider is far right
    labelAfter.style.opacity  = p > 0.80 ? '1' : '0';
    // Show BEFORE label only when slider is far left
    labelBefore.style.opacity = p < 0.20 ? '1' : '0';
  }

  window.addEventListener('load', () => {
    slider.style.setProperty('--slider-full-width', slider.offsetWidth + 'px');
    after.querySelectorAll('img').forEach(el => el.style.minWidth = slider.offsetWidth + 'px');
  });

  slider.addEventListener('mousedown',  e => { dragging = true; hint.style.opacity = '0'; setPos(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove',  e => { if (dragging) setPos(e.clientX); });
  window.addEventListener('mouseup',    () => { dragging = false; });
  slider.addEventListener('touchstart', e => { dragging = true; hint.style.opacity = '0'; setPos(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchmove',  e => { if (dragging) setPos(e.touches[0].clientX); }, { passive: true });
  window.addEventListener('touchend',   () => { dragging = false; });

  // ---- Price Estimator ----
  const BASE = 7.00;
  let surcharge = 0, condLabel = 'Good Condition';

  function fmt(n) { return '$' + n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

  function setSize(sqft, btn) {
    document.getElementById('sqft-input').value = sqft;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active-size'));
    btn.classList.add('active-size');
    updateEstimate();
  }

  function selectCondition(card) {
    document.querySelectorAll('.condition-card').forEach(c => {
      c.classList.remove('selected');
      c.querySelector('.cond-tick').innerHTML = '';
      c.querySelector('.cond-tick').style.borderColor = '';
    });
    card.classList.add('selected');
    surcharge  = parseFloat(card.dataset.surcharge);
    condLabel  = card.dataset.label;
    const tick = card.querySelector('.cond-tick');
    tick.innerHTML = '<div class="w-2 h-2 rounded-full bg-primary"></div>';
    tick.style.borderColor = '#FEC300';
    tick.style.background  = 'rgba(254,195,0,0.2)';
    updateEstimate();
  }

  function updateEstimate() {
    const sqft = parseInt(document.getElementById('sqft-input').value, 10);
    const disp = document.getElementById('estimate-display');
    const ph   = document.getElementById('estimate-placeholder');
    const cta  = document.getElementById('estimate-cta');
    if (!sqft || sqft < 1) { disp.classList.add('hidden'); ph.classList.remove('hidden'); cta.classList.add('hidden'); return; }

    const total = sqft * BASE;
    document.getElementById('price-total').textContent = fmt(total);

    ph.classList.add('hidden');
    disp.classList.remove('hidden');
    cta.classList.remove('hidden');
    const pv = document.getElementById('price-value');
    pv.classList.remove('price-reveal'); void pv.offsetWidth; pv.classList.add('price-reveal');
  }

  updateEstimate();
</script>

<script>
  // Formspree AJAX submission — garage quote form
  const garageForm = document.getElementById('garage-form');
  if (garageForm) {
    garageForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('garage-submit-btn');
      const success = document.getElementById('garage-form-success');
      const error = document.getElementById('garage-form-error');
      btn.textContent = 'Sending...';
      btn.disabled = true;
      try {
        const res = await fetch(this.action, {
          method: 'POST',
          body: new FormData(this),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          btn.style.display = 'none';
          success.classList.remove('hidden');
        } else {
          btn.textContent = 'Get My Free Quote';
          btn.disabled = false;
          error.classList.remove('hidden');
        }
      } catch(err) {
        btn.textContent = 'Get My Free Quote';
        btn.disabled = false;
        error.classList.remove('hidden');
      }
    });
  }
</script>
